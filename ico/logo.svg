<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 线条渐变色：靛蓝到天蓝，更具科技感 -->
        <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4F46E5" /> <!-- 靛蓝 -->
            <stop offset="100%" stop-color="#0EA5E9" /> <!-- 天蓝 -->
        </linearGradient>
    </defs>

    <!-- 背景透明，无底色矩形 -->

    <!-- 左侧粗实线（象征VPK资源层并行叠加） -->
    <g stroke="url(#lineGrad)" stroke-linecap="round" fill="none">
        <!-- 上方粗线 -->
        <line x1="100" y1="160" x2="250" y2="160" stroke-width="20" />
        <!-- 下方粗线 -->
        <line x1="100" y1="240" x2="250" y2="240" stroke-width="20" />
    </g>

    <!-- 右侧分支与网络图（象征依赖关系分析） -->
    <g stroke="url(#lineGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <!-- 上方粗线分支 -->
        <path d="M 250 160 L 350 120 L 500 120" />
        <path d="M 250 160 L 350 160 L 500 160" />
        <path d="M 250 160 L 350 200 L 500 200" />

        <!-- 下方粗线分支 -->
        <path d="M 250 240 L 350 200 L 500 200" />
        <path d="M 250 240 L 350 240 L 500 240" />
        <path d="M 250 240 L 350 280 L 500 280" />

        <!-- 右侧垂直连接线（形成依赖图） -->
        <line x1="500" y1="120" x2="500" y2="160" />
        <line x1="500" y1="160" x2="500" y2="200" />
        <line x1="500" y1="200" x2="500" y2="240" />
        <line x1="500" y1="240" x2="500" y2="280" />

        <!-- 对角线连接线（增强网络结构感） -->
        <line x1="350" y1="120" x2="500" y2="160" />
        <line x1="350" y1="160" x2="500" y2="200" />
        <line x1="350" y1="200" x2="500" y2="240" />
        <line x1="350" y1="240" x2="500" y2="280" />
        
        <!-- 额外跨层级连接 -->
        <line x1="350" y1="120" x2="500" y2="200" />
        <line x1="350" y1="160" x2="500" y2="240" />
        <line x1="350" y1="200" x2="500" y2="280" />
    </g>

    <!-- 高亮节点（依赖关系交汇点），橙色与蓝渐变形成对比 -->
    <g fill="#F97316" stroke="#FFFFFF" stroke-width="2">
        <!-- 左侧分支节点 -->
        <circle cx="350" cy="120" r="7" />
        <circle cx="350" cy="160" r="7" />
        <circle cx="350" cy="200" r="7" />
        <circle cx="350" cy="240" r="7" />
        <circle cx="350" cy="280" r="7" />

        <!-- 右侧交汇节点 -->
        <circle cx="500" cy="120" r="7" />
        <circle cx="500" cy="160" r="7" />
        <circle cx="500" cy="200" r="7" />
        <circle cx="500" cy="240" r="7" />
        <circle cx="500" cy="280" r="7" />
    </g>
</svg>