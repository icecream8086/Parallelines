name: CI Build Experiment

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant (V0-V4, or ALL)'
        required: true
        default: 'ALL'
        type: choice
        options:
          - V0
          - V1
          - V2
          - V3
          - V4
          - ALL

permissions:
  contents: read

jobs:
  experiment:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: parallelines
          channels: conda-forge,defaults
          auto-activate-base: false

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y python3-dev binutils libcairo2-dev

      - name: Install project package
        run: pip install -e ".[dev,build]"

      - name: Generate icon
        run: python scripts/generate_ico.py

      - name: Environment snapshot
        run: python scripts/ci_env_snapshot.py --output env_snapshot.json

      - name: Upload environment snapshot
        uses: actions/upload-artifact@v4
        with:
          name: env-snapshot-${{ matrix.os }}
          path: env_snapshot.json
          retention-days: 30

      - name: Build V0 — CI baseline (full excludes)
        if: inputs.variant == 'ALL' || inputs.variant == 'V0'
        run: python scripts/build_exe.py --minimal
        continue-on-error: true

      - name: Audit V0
        if: inputs.variant == 'ALL' || inputs.variant == 'V0'
        run: python scripts/ci_audit.py dist/parallelines --json audit_V0.json || true

      - name: Upload V0 audit
        if: inputs.variant == 'ALL' || inputs.variant == 'V0'
        uses: actions/upload-artifact@v4
        with:
          name: audit-V0-${{ matrix.os }}
          path: audit_V0.json
          retention-days: 30

      - name: Build V1 — no excludes
        if: inputs.variant == 'ALL' || inputs.variant == 'V1'
        run: |
          python -c "
          import subprocess, sys, os
          args = [
              sys.executable, '-m', 'PyInstaller',
              '--noconfirm', '--name', 'parallelines',
              '--distpath', 'dist_V1', '--specpath', '.',
              '--onedir', '--optimize', '1', '--noupx',
              '--collect-data', 'parallelines',
              '--collect-submodules', 'parallelines',
              '--collect-data', 'srctools',
              '--add-data', 'queries${os.pathsep}queries',
              '--hidden-import', 'parallelines.repl',
              '--hidden-import', 'parallelines.repl.session',
              '--hidden-import', 'parallelines.repl.commands',
              '--hidden-import', 'parallelines.repl.completer',
              '--hidden-import', 'parallelines.repl.formatter',
              '--hidden-import', 'parallelines.repl.prompt',
              'src/parallelines/cli.py'
          ]
          subprocess.check_call(args)
          "
        continue-on-error: true

      - name: Audit V1
        if: inputs.variant == 'ALL' || inputs.variant == 'V1'
        run: |
          python scripts/ci_audit.py dist_V1/parallelines --json audit_V1.json || true

      - name: Upload V1 audit
        if: inputs.variant == 'ALL' || inputs.variant == 'V1'
        uses: actions/upload-artifact@v4
        with:
          name: audit-V1-${{ matrix.os }}
          path: audit_V1.json
          retention-days: 30

      - name: Build V2 — keep pandas/numpy/pyarrow
        if: inputs.variant == 'ALL' || inputs.variant == 'V2'
        run: |
          python -c "
          import subprocess, sys, os
          EXCLUDE = [
              'pytest', '_pytest', 'distutils', 'pkg_resources',
              'jinja2', 'markupsafe', 'matplotlib', 'PIL',
              'scipy', 'sklearn', 'cv2', 'torch', 'tensorflow',
              'pyarrow.flight', 'pyarrow.gandiva', 'pyarrow.parquet.encryption',
              'textual', 'textual.devtools',
          ]
          args = [
              sys.executable, '-m', 'PyInstaller',
              '--noconfirm', '--name', 'parallelines',
              '--distpath', 'dist_V2', '--specpath', '.',
              '--onedir', '--optimize', '1', '--noupx',
              '--collect-data', 'parallelines',
              '--collect-submodules', 'parallelines',
              '--collect-data', 'srctools',
              '--add-data', 'queries${os.pathsep}queries',
              '--hidden-import', 'parallelines.repl',
              '--hidden-import', 'parallelines.repl.session',
              '--hidden-import', 'parallelines.repl.commands',
              '--hidden-import', 'parallelines.repl.completer',
              '--hidden-import', 'parallelines.repl.formatter',
              '--hidden-import', 'parallelines.repl.prompt',
          ]
          for m in EXCLUDE:
              args += ['--exclude-module', m]
          args += ['src/parallelines/cli.py']
          subprocess.check_call(args)
          "
        continue-on-error: true

      - name: Audit V2
        if: inputs.variant == 'ALL' || inputs.variant == 'V2'
        run: |
          python scripts/ci_audit.py dist_V2/parallelines --json audit_V2.json || true

      - name: Upload V2 audit
        if: inputs.variant == 'ALL' || inputs.variant == 'V2'
        uses: actions/upload-artifact@v4
        with:
          name: audit-V2-${{ matrix.os }}
          path: audit_V2.json
          retention-days: 30

      - name: Build V3 — keep textual
        if: inputs.variant == 'ALL' || inputs.variant == 'V3'
        run: |
          python -c "
          import subprocess, sys, os
          EXCLUDE = [
              'pytest', '_pytest', 'distutils', 'pkg_resources',
              'jinja2', 'markupsafe', 'matplotlib', 'PIL',
              'scipy', 'sklearn', 'cv2', 'torch', 'tensorflow',
              'pyarrow.flight', 'pyarrow.gandiva', 'pyarrow.parquet.encryption',
              'pandas', 'numpy', 'pyarrow',
          ]
          args = [
              sys.executable, '-m', 'PyInstaller',
              '--noconfirm', '--name', 'parallelines',
              '--distpath', 'dist_V3', '--specpath', '.',
              '--onedir', '--optimize', '1', '--noupx',
              '--collect-data', 'parallelines',
              '--collect-submodules', 'parallelines',
              '--collect-data', 'srctools',
              '--add-data', 'queries${os.pathsep}queries',
              '--hidden-import', 'parallelines.repl',
              '--hidden-import', 'parallelines.repl.session',
              '--hidden-import', 'parallelines.repl.commands',
              '--hidden-import', 'parallelines.repl.completer',
              '--hidden-import', 'parallelines.repl.formatter',
              '--hidden-import', 'parallelines.repl.prompt',
          ]
          for m in EXCLUDE:
              args += ['--exclude-module', m]
          args += ['src/parallelines/cli.py']
          subprocess.check_call(args)
          "
        continue-on-error: true

      - name: Audit V3
        if: inputs.variant == 'ALL' || inputs.variant == 'V3'
        run: |
          python scripts/ci_audit.py dist_V3/parallelines --json audit_V3.json || true

      - name: Upload V3 audit
        if: inputs.variant == 'ALL' || inputs.variant == 'V3'
        uses: actions/upload-artifact@v4
        with:
          name: audit-V3-${{ matrix.os }}
          path: audit_V3.json
          retention-days: 30

      - name: Build V4 — explicit hidden-import all submodules
        if: inputs.variant == 'ALL' || inputs.variant == 'V4'
        run: |
          python -c "
          import subprocess, sys, os
          from PyInstaller.utils.hooks import collect_submodules
          mods = collect_submodules('parallelines')
          print(f'Found {len(mods)} submodules')
          args = [
              sys.executable, '-m', 'PyInstaller',
              '--noconfirm', '--name', 'parallelines',
              '--distpath', 'dist_V4', '--specpath', '.',
              '--onedir', '--optimize', '1', '--noupx',
              '--collect-data', 'parallelines',
              '--collect-data', 'srctools',
              '--add-data', 'queries${os.pathsep}queries',
              '--icon', 'ico/logo.ico',
          ]
          for m in mods:
              args += ['--hidden-import', m]
          EXCLUDE = [
              'pytest', '_pytest', 'distutils', 'pkg_resources',
              'jinja2', 'markupsafe', 'matplotlib', 'PIL',
              'scipy', 'sklearn', 'cv2', 'torch', 'tensorflow',
              'pyarrow.flight', 'pyarrow.gandiva', 'pyarrow.parquet.encryption',
              'textual', 'textual.devtools',
              'pandas', 'numpy', 'pyarrow',
          ]
          for m in EXCLUDE:
              args += ['--exclude-module', m]
          args += ['src/parallelines/cli.py']
          subprocess.check_call(args)
          "
        continue-on-error: true

      - name: Audit V4
        if: inputs.variant == 'ALL' || inputs.variant == 'V4'
        run: |
          python scripts/ci_audit.py dist_V4/parallelines --json audit_V4.json || true

      - name: Upload V4 audit
        if: inputs.variant == 'ALL' || inputs.variant == 'V4'
        uses: actions/upload-artifact@v4
        with:
          name: audit-V4-${{ matrix.os }}
          path: audit_V4.json
          retention-days: 30

      - name: Upload all build outputs (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs-${{ matrix.os }}
          path: |
            dist/parallelines/
            dist_V1/parallelines/
            dist_V2/parallelines/
            dist_V3/parallelines/
            dist_V4/parallelines/
          retention-days: 7
