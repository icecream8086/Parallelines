name: Build

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "src/**"
      - "scripts/build_exe.py"
      - "queries/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y python3-dev binutils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Resolve artifact name
        id: artifact
        shell: bash
        run: |
          VERSION=$(python -c "from importlib.metadata import version; print(version('parallelines'))")
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            NAME="parallelines-$VERSION-win64-minimal.zip"
          else
            NAME="parallelines-$VERSION-linux-x86_64-minimal.tar.gz"
          fi
          echo "NAME=$NAME" >> $GITHUB_OUTPUT

      - name: Build minimal binary
        run: python scripts/build_exe.py --minimal

      - name: Package dist (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          & "C:\Program Files\7-Zip\7z.exe" a -tzip "${{ steps.artifact.outputs.NAME }}" .\dist\parallelines\*

      - name: Package dist (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cd dist && tar -czf "../${{ steps.artifact.outputs.NAME }}" parallelines/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.NAME }}
          path: ${{ steps.artifact.outputs.NAME }}
          retention-days: 7

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.NAME }}
          generate_release_notes: true
