name: Build

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "queries/**"
      - "ico/**"
      - "environment.yml"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
        include:
          - os: ubuntu-22.04
            shell: bash -l {0}
            py: python
            pip: pip
          - os: windows-latest
            shell: pwsh
            py: python
            pip: pip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: parallelines
          channels: conda-forge,defaults
          auto-activate-base: false

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y python3-dev binutils libcairo2-dev

      - name: Install project package
        run: ${{ matrix.pip }} install -e ".[dev,build]"

      - name: Generate icon
        run: ${{ matrix.py }} scripts/generate_ico.py

      - name: Cache PyInstaller analysis
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pyinstaller
            ~/AppData/Local/pyinstaller
          key: pyinstaller-${{ matrix.os }}-${{ hashFiles('pyproject.toml', 'src/**/*.py') }}
          restore-keys: |
            pyinstaller-${{ matrix.os }}-

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: ${{ matrix.py }} -m pytest tests/engine/ -q --tb=short --ignore=tests/engine/test_query_properties.py

      - name: Build full binary (with pandas/pyarrow cache)
        run: ${{ matrix.py }} scripts/build_exe.py

      - name: Post-build artifact audit (full)
        run: ${{ matrix.py }} scripts/ci_audit.py dist/parallelines --json audit_report_full.json

      - name: Upload audit report (full)
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-full-${{ matrix.os }}
          path: audit_report_full.json
          retention-days: 7

      - name: Rename full dist & build minimal binary
        shell: ${{ matrix.shell }}
        run: |
          ${{ matrix.py }} -c "import shutil; shutil.move('dist/parallelines', 'dist/parallelines-full')"
          ${{ matrix.py }} scripts/build_exe.py --minimal

      - name: Post-build artifact audit (minimal)
        run: ${{ matrix.py }} scripts/ci_audit.py dist/parallelines --json audit_report.json

      - name: Upload audit report (minimal)
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ matrix.os }}
          path: audit_report.json
          retention-days: 30

      - name: Package dist (Windows)
        if: matrix.os == 'windows-latest'
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          $version = python -c "from importlib.metadata import version; print(version('parallelines'))"
          cd dist
          # Minimal — dist/parallelines 已经是最小包
          7z a -tzip -r "..\parallelines-$version-win64-minimal.zip" parallelines\*
          Remove-Item -Recurse -Force parallelines
          # Full
          Rename-Item parallelines-full parallelines
          7z a -tzip -r "..\parallelines-$version-win64-full.zip" parallelines\*
          Remove-Item -Recurse -Force parallelines
          cd ..
          echo "MINIMAL_ARTIFACT=parallelines-$version-win64-minimal.zip" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          echo "FULL_ARTIFACT=parallelines-$version-win64-full.zip" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Package dist (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          VERSION=$(python -c "from importlib.metadata import version; print(version('parallelines'))")
          cd dist
          # Minimal — dist/parallelines 已经是最小包
          tar -czf "../parallelines-$VERSION-linux-x86_64-minimal.tar.gz" parallelines/
          rm -rf parallelines
          # Full
          mv parallelines-full parallelines
          tar -czf "../parallelines-$VERSION-linux-x86_64-full.tar.gz" parallelines/
          rm -rf parallelines
          cd ..
          echo "MINIMAL_ARTIFACT=parallelines-$VERSION-linux-x86_64-minimal.tar.gz" >> $GITHUB_ENV
          echo "FULL_ARTIFACT=parallelines-$VERSION-linux-x86_64-full.tar.gz" >> $GITHUB_ENV

      - name: Upload minimal artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MINIMAL_ARTIFACT }}
          path: ${{ env.MINIMAL_ARTIFACT }}
          retention-days: 7

      - name: Upload full artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FULL_ARTIFACT }}
          path: ${{ env.FULL_ARTIFACT }}
          retention-days: 7

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.MINIMAL_ARTIFACT }}
            ${{ env.FULL_ARTIFACT }}
          generate_release_notes: true
