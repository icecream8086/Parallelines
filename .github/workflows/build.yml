name: Build

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "queries/**"
      - "ico/**"
      - "environment.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: parallelines
          channels: conda-forge,defaults
          auto-activate-base: false

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y python3-dev binutils libcairo2-dev

      - name: Install project package
        run: pip install ".[dev,build]"

      - name: Generate icon
        run: python scripts/generate_ico.py

      - name: Cache PyInstaller analysis
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pyinstaller
            ~/AppData/Local/pyinstaller
          key: pyinstaller-${{ matrix.os }}-${{ hashFiles('pyproject.toml', 'src/**/*.py') }}
          restore-keys: |
            pyinstaller-${{ matrix.os }}-

      - name: Run tests
        run: python -m pytest tests/engine/ -q --tb=short --ignore=tests/engine/test_query_properties.py

      - name: Build minimal binary
        run: python scripts/build_exe.py --minimal

      - name: Post-build artifact audit
        run: python scripts/ci_audit.py dist/parallelines --json audit_report.json

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ matrix.os }}
          path: audit_report.json
          retention-days: 30

      - name: Package dist (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          VERSION=$(python -c "from importlib.metadata import version; print(version('parallelines'))")
          NAME="parallelines-$VERSION-win64-minimal.zip"
          7z a -tzip -r "$NAME" dist/parallelines/*
          echo "ARTIFACT_NAME=$NAME" >> $GITHUB_ENV

      - name: Package dist (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          VERSION=$(python -c "from importlib.metadata import version; print(version('parallelines'))")
          NAME="parallelines-$VERSION-linux-x86_64-minimal.tar.gz"
          cd dist && tar -czf "../$NAME" parallelines/
          echo "ARTIFACT_NAME=$NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 7

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_NAME }}
          generate_release_notes: true
